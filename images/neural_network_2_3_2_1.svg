<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Neural network: 2 inputs, 3 neurons, 2 neurons, 1 output</title>
  <desc>Four-layer feedforward neural network diagram showing 2 input nodes, a hidden layer of 3 neurons, a second hidden layer of 2 neurons, and 1 output neuron, fully connected between adjacent layers.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8a8a8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="520" fill="#ffffff"/>

  <!-- ===== Connections: Input -> Hidden 1 ===== -->
  <g stroke="#b7b0f0" stroke-width="1" opacity="0.7">
    <line x1="110" y1="150" x2="260" y2="80"/>
    <line x1="110" y1="150" x2="260" y2="260"/>
    <line x1="110" y1="150" x2="260" y2="440"/>
    <line x1="110" y1="370" x2="260" y2="80"/>
    <line x1="110" y1="370" x2="260" y2="260"/>
    <line x1="110" y1="370" x2="260" y2="440"/>
  </g>

  <!-- ===== Connections: Hidden 1 -> Hidden 2 ===== -->
  <g stroke="#7dd3b8" stroke-width="1" opacity="0.7">
    <line x1="300" y1="80" x2="450" y2="170"/>
    <line x1="300" y1="80" x2="450" y2="350"/>
    <line x1="300" y1="260" x2="450" y2="170"/>
    <line x1="300" y1="260" x2="450" y2="350"/>
    <line x1="300" y1="440" x2="450" y2="170"/>
    <line x1="300" y1="440" x2="450" y2="350"/>
  </g>

  <!-- ===== Connections: Hidden 2 -> Output ===== -->
  <g stroke="#f2b880" stroke-width="1" opacity="0.8">
    <line x1="490" y1="170" x2="620" y2="260" marker-end="url(#arrow)"/>
    <line x1="490" y1="350" x2="620" y2="260" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== Input layer (2 nodes) ===== -->
  <g>
    <circle cx="90" cy="150" r="34" fill="#e6f1fb" stroke="#378add" stroke-width="1.5"/>
    <text x="90" y="146" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0c447c">x1</text>
    <text x="90" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#185fa5">input</text>

    <circle cx="90" cy="370" r="34" fill="#e6f1fb" stroke="#378add" stroke-width="1.5"/>
    <text x="90" y="366" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0c447c">x2</text>
    <text x="90" y="382" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#185fa5">input</text>
  </g>

  <!-- ===== Hidden layer 1 (3 neurons) ===== -->
  <g>
    <circle cx="280" cy="80" r="36" fill="#eeedfe" stroke="#534ab7" stroke-width="1.5"/>
    <text x="280" y="76" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215c">a1_1</text>
    <text x="280" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#3c3489">neuron</text>

    <circle cx="280" cy="260" r="36" fill="#eeedfe" stroke="#534ab7" stroke-width="1.5"/>
    <text x="280" y="256" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215c">a1_2</text>
    <text x="280" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#3c3489">neuron</text>

    <circle cx="280" cy="440" r="36" fill="#eeedfe" stroke="#534ab7" stroke-width="1.5"/>
    <text x="280" y="436" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215c">a1_3</text>
    <text x="280" y="452" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#3c3489">neuron</text>
  </g>

  <!-- ===== Hidden layer 2 (2 neurons) ===== -->
  <g>
    <circle cx="470" cy="170" r="36" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1.5"/>
    <text x="470" y="166" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#04342c">a2_1</text>
    <text x="470" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#085041">neuron</text>

    <circle cx="470" cy="350" r="36" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1.5"/>
    <text x="470" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#04342c">a2_2</text>
    <text x="470" y="362" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#085041">neuron</text>
  </g>

  <!-- ===== Output layer (1 neuron) ===== -->
  <g>
    <circle cx="650" cy="260" r="38" fill="#faece7" stroke="#993c1d" stroke-width="1.5"/>
    <text x="650" y="256" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#4a1b0c">a3_1</text>
    <text x="650" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#712b13">output</text>
  </g>

  <!-- ===== Layer labels ===== -->
  <text x="90" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#666">input layer</text>
  <text x="280" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#666">hidden layer 1 (3 neurons)</text>
  <text x="470" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#666">hidden layer 2 (2 neurons)</text>
  <text x="650" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#666">output layer</text>
</svg>
